name: Generate social drafts

on:
  push:
    branches: [main]
    paths:
      - "src/content/**/*.mdx"
      - "src/content/**/*.md"
      - "social/prompt-rules.md"
      - "scripts/generate-social-drafts.mjs"
  workflow_dispatch:
    inputs:
      regenerate_all:
        description: "Regenerate drafts for ALL content (ignore processed state)"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

# Avoid concurrent runs that could race on the state file commit.
concurrency:
  group: social-drafts
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate drafts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_URL: https://daniel.sinapsys.work
          REGENERATE_ALL: ${{ github.event.inputs.regenerate_all }}
        run: node scripts/generate-social-drafts.mjs

      - name: Commit updated state
        run: |
          if git diff --quiet social/.processed.json; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add social/.processed.json
          git commit -m "chore(social): update processed state [skip ci]"
          git push
