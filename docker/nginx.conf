# ----------------------------------------------------------------
# nginx config for danielmiralles.com / daniel.sinapsys.work
#
# Static Astro site served from /usr/share/nginx/html.
# HTTPS is terminated by Traefik (Coolify); this server only speaks HTTP.
# ----------------------------------------------------------------

# Compression for text-like assets.
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/atom+xml
    application/rss+xml
    application/manifest+json
    image/svg+xml
    font/woff
    font/woff2;

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Astro builds /posts/foo/index.html. Without this, when a browser
    # requests /posts/foo (no trailing slash) nginx issues an absolute
    # redirect to add the slash and DROPS non-standard ports (e.g. :8080),
    # breaking local docker runs. Relative redirects keep scheme/host/port.
    absolute_redirect off;

    # Security headers — applied to every response.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    # ----------------------------------------------------------------
    # Hashed Astro assets — Astro emits /_astro/<hash>.<ext>
    # These are content-hashed, safe to cache forever.
    # ----------------------------------------------------------------
    location /_astro/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ----------------------------------------------------------------
    # Long-cache static media (fonts, images, OG PNGs).
    # ----------------------------------------------------------------
    location ~* \.(?:png|jpg|jpeg|gif|webp|avif|svg|ico|woff2?|ttf|otf)$ {
        access_log off;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    # ----------------------------------------------------------------
    # Giscus custom theme — fetched cross-origin from the giscus.app
    # iframe, so it needs CORS. Locked to giscus.app to avoid being a
    # generic CORS resource.
    # ----------------------------------------------------------------
    location = /giscus-theme.css {
        access_log off;
        add_header Access-Control-Allow-Origin "https://giscus.app" always;
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # ----------------------------------------------------------------
    # RSS, sitemap, and any .xml — short cache so updates show up fast.
    # ----------------------------------------------------------------
    location ~* \.xml$ {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        types { application/xml xml; }
        default_type application/xml;
        try_files $uri =404;
    }

    # ----------------------------------------------------------------
    # HTML pages — must always revalidate so new content surfaces.
    # try_files handles Astro's directory-format URLs (/posts/foo/ → /posts/foo/index.html).
    # ----------------------------------------------------------------
    location / {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri $uri/ $uri.html =404;
    }

    # 404 — Astro generates dist/404.html when src/pages/404.astro exists, otherwise its default.
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Healthcheck for Coolify / Traefik.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
