# ----------------------------------------------------------------
# Legacy-domain redirect — danielmiralles.com → daniel.sinapsys.work
#
# 301 (permanent) preserves path and passes link equity for SEO.
# server_name _ accepts any Host header, so Coolify can route both
# apex (danielmiralles.com) and www. (www.danielmiralles.com) here.
# ----------------------------------------------------------------

server {
    listen 80 default_server;
    server_name _;

    # Tiny healthcheck for Coolify probes (must NOT be redirected).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Everything else: 301 to the canonical site, preserving path.
    location / {
        return 301 https://daniel.sinapsys.work$request_uri;
    }
}
